  # ============================================================================
  # STARVED-REGIME generative runs (100k / 150k) — THE decisive experiment.
  # Generative restoration is theorized to pay off only where the codec is
  # bit-starved; every generative point so far is at a comfortable ~460k, where
  # the chain is broken on BOTH FG-PSNR and (bitrate-matched) FG-LPIPS. These
  # add the ≤150k points to test the "PRESLEY wins when starved" claim against
  # the existing x265 baseline sweep (compare bitrate-matched FG-LPIPS, not raw).
